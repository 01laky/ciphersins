name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: npm run format && npm run typecheck && npm run build && npm run test:ci && npm run smoke:cli

      - name: Dry-run pack core
        working-directory: packages/core
        run: npm pack --dry-run

      - name: Dry-run pack cli
        working-directory: packages/cli
        run: npm pack --dry-run

      - name: Publish @ciphersins/core
        run: pnpm --filter @ciphersins/core publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish ciphersins CLI
        run: pnpm --filter ciphersins publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
